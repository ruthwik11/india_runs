name: Deploy Backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP (keyless / WIF)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sarkarisaathi-backend \
            --source backend \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --service-account "${{ vars.RUNTIME_SA }}" \
            --memory 2Gi --cpu 2 --timeout 300 \
            --set-env-vars "^##^GCP_PROJECT_ID=${{ vars.GCP_PROJECT }}##FIRESTORE_DATABASE=(default)##VECTOR_DISTANCE=COSINE##GROQ_MODEL=llama-3.1-8b-instant##GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
