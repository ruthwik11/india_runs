version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-sarkarisaathi-687f1}
      - FIRESTORE_DATABASE=${FIRESTORE_DATABASE:-(default)}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/firebase-sa.json
      - VECTOR_DISTANCE=COSINE
    volumes:
      # mount the service-account JSON read-only; set SA_KEY_PATH in your .env
      - ${SA_KEY_PATH:-./backend/secrets/firebase-sa.json}:/app/secrets/firebase-sa.json:ro
    networks:
      - sarkari-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - sarkari-network

networks:
  sarkari-network:
    driver: bridge
