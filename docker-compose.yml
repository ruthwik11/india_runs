version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_PERSISTENT_PATH=/app/chroma_db
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    networks:
      - sarkari-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://backend:8000
    depends_on:
      - backend
    networks:
      - sarkari-network

networks:
  sarkari-network:
    driver: bridge
